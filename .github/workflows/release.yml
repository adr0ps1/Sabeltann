name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - uses: googleapis/release-please-action@7987652d64b4581673a76e33ad5e98e3dd56832f # v4.1.3
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  build-install:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    env:
      PRODUCT_VERSION: ${{ needs.release-please.outputs.tag_name }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25 # v4.1.0
        with:
          dotnet-version: 10.0.x

      - run: dotnet restore

      - run: dotnet publish --configuration Release --runtime win-x64 --self-contained true

      # Resolve publish dir without hardcoding the TFM (net9.0 vs net10.0 etc.)
      - name: Locate publish directory
        shell: pwsh
        run: |
          $dir = Get-ChildItem "bin/Release/**/win-x64/publish" -Directory |
                 Sort-Object LastWriteTime -Descending |
                 Select-Object -First 1 -ExpandProperty FullName
          if (-not $dir) { Write-Error "Publish dir not found"; exit 1 }
          "PUBLISH_DIR=$dir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install WiX Toolset v3
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          $bin = Get-ChildItem "C:\Program Files (x86)\WiX Toolset v3*\bin" -Directory |
                 Sort-Object Name | Select-Object -Last 1 -ExpandProperty FullName
          "WIX=$bin\" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build MSI Installer
        run: pwsh -File Setup\build.ps1
        env:
          PRODUCT_VERSION: ${{ needs.release-please.outputs.tag_name }}

      - name: Attest build provenance (exe)
        uses: actions/attest-build-provenance@bd77c077858b8d561b7a36cbe48ef4cc642ca39d # v2.2.2
        with:
          subject-path: ${{ env.PUBLISH_DIR }}\Sabeltann.exe

      - name: Attest build provenance (msi)
        uses: actions/attest-build-provenance@bd77c077858b8d561b7a36cbe48ef4cc642ca39d # v2.2.2
        with:
          subject-path: installer/*.msi

      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: Sabeltann-${{ needs.release-please.outputs.tag_name }}
          path: |
            ${{ env.PUBLISH_DIR }}/
            installer/
          compression-level: 9

      - uses: softprops/action-gh-release@01570a1f39cb168c169c802c3bceb9e93fb10974 # v2.1.0
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            ${{ env.PUBLISH_DIR }}/Sabeltann.exe
            installer/*.msi
          generate_release_notes: false
