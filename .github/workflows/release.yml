name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  build-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25 # v4.1.0
        with:
          dotnet-version: 10.0.x

      - run: dotnet restore

      - name: Publish self-contained win-x64
        run: dotnet publish --configuration Release --runtime win-x64 --self-contained true --output publish

      - name: Install Velopack CLI (vpk)
        shell: pwsh
        run: |
          dotnet tool install -g vpk --version 1.2.0
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ needs.release-please.outputs.tag_name }}".TrimStart('v')
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # Pull the previous release's Velopack assets so vpk can build a delta
      # package. Best-effort: the first Velopack release has nothing to diff
      # against, so a failure here must not fail the build.
      - name: Download previous release (for delta updates)
        continue-on-error: true
        shell: pwsh
        run: |
          vpk download github `
            --repoUrl https://github.com/${{ github.repository }} `
            --token ${{ secrets.GITHUB_TOKEN }} `
            --outputDir Releases

      - name: Build Velopack release
        shell: pwsh
        run: |
          vpk pack `
            --packId Sabeltann `
            --packVersion ${{ steps.ver.outputs.version }} `
            --packDir publish `
            --mainExe Sabeltann.exe `
            --packTitle Sabeltann `
            --packAuthors Sabeltann `
            --icon Assets/Sabeltann.ico `
            --outputDir Releases

      - name: Attest build provenance (app exe)
        uses: actions/attest-build-provenance@bd77c077858b8d561b7a36cbe48ef4cc642ca39d # v2.2.2
        with:
          subject-path: publish/Sabeltann.exe

      - name: Attest build provenance (installer)
        uses: actions/attest-build-provenance@bd77c077858b8d561b7a36cbe48ef4cc642ca39d # v2.2.2
        with:
          subject-path: Releases/*-Setup.exe

      # Merges the Velopack assets (Setup.exe, portable zip, full/delta .nupkg
      # and the releases.win.json manifest the in-app updater reads) into the
      # release-please release for this tag.
      - name: Upload Velopack release to GitHub
        shell: pwsh
        run: |
          vpk upload github `
            --repoUrl https://github.com/${{ github.repository }} `
            --token ${{ secrets.GITHUB_TOKEN }} `
            --outputDir Releases `
            --publish `
            --merge `
            --tag ${{ needs.release-please.outputs.tag_name }} `
            --releaseName ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: Sabeltann-${{ needs.release-please.outputs.tag_name }}
          path: Releases/
          compression-level: 9
